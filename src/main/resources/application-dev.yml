spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:smart_agri_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.smartagri: DEBUG
    org.springframework.security: DEBUG
